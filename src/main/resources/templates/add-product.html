<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>
<body class="app-body">
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container py-4">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="glass-panel p-4 mb-4" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; backdrop-filter: blur(10px);">
                <h5 class="mb-3"><i class="bi bi-cpu-fill me-2 text-primary"></i>AI Product Recognition</h5>
                <input type="file" id="aiUpload" class="form-control mb-3" accept="image/*">
                <button type="button" id="scanBtn" class="btn btn-primary w-100 py-2" onclick="startAiScan()">
                    <span id="btnText">Identify Product with AI</span>
                </button>
            </div>

            <div class="glass-panel p-4" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;">
                <form th:action="@{/add-product}" th:object="${product}" method="post">
                    <div class="mb-3">
                        <label class="form-label text-muted">Product Name</label>
                        <input type="text" id="nameField" th:field="*{name}" class="form-control bg-dark text-white border-secondary" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-muted">Category</label>
                        <input type="text" id="categoryField" th:field="*{category}" class="form-control bg-dark text-white border-secondary" required>
                    </div>
                    <div class="row g-3">
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-muted">Price</label>
                            <input type="number" step="0.01" th:field="*{price}" class="form-control bg-dark text-white border-secondary" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-muted">Quantity</label>
                            <input type="number" th:field="*{quantity}" class="form-control bg-dark text-white border-secondary" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-success w-100 py-2 mt-2">Add to Inventory</button>
                </form>
            </div>
        </div>
    </div>
</main>

<script>
async function startAiScan() {
    const fileInput = document.getElementById('aiUpload');
    const btn = document.getElementById('scanBtn');
    const btnText = document.getElementById('btnText');

    if (!fileInput.files || !fileInput.files[0]) return alert("Please select an image first!");

    btn.disabled = true;
    btnText.innerText = "Analyzing Image...";

    const formData = new FormData();
    formData.append("file", fileInput.files[0]);

    try {
        const response = await fetch('/api/scan', { method: 'POST', body: formData });
        if (!response.ok) throw new Error();
        const data = await response.json();
        
        document.getElementById('nameField').value = data.name;
        document.getElementById('categoryField').value = data.category;
        
        btnText.innerText = "Scan Successful!";
        btn.className = "btn btn-success w-100 py-2";
    } catch (err) {
        alert("Check if Python is running on port 8000!");
        btn.disabled = false;
        btnText.innerText = "Retry AI Scan";
    }
}
</script>
</body>
</html>
