<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>
<body class="bg-light">
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container">
    <div th:replace="~{fragments/layout :: flash}"></div>

    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h4 mb-0">
                <i class="bi bi-exclamation-triangle text-warning me-2"></i>Low Stock Alert
            </h1>
            <small class="text-muted">
                Products with quantity at or below
                <strong th:text="${lowStockThreshold}"></strong> units
            </small>
        </div>
        <a href="/products" class="btn btn-sm btn-outline-secondary">
            <i class="bi bi-arrow-left me-1"></i>All Products
        </a>
    </div>

    <div th:if="${#lists.isEmpty(products)}" class="text-center py-5 bg-white rounded shadow-sm">
        <i class="bi bi-check-circle text-success display-5 d-block mb-3"></i>
        <h5 class="text-success">All stocked up!</h5>
        <p class="text-muted">No products are running low right now.</p>
    </div>

    <div th:if="${!#lists.isEmpty(products)}" class="table-responsive bg-white shadow-sm rounded p-2">
        <table class="table table-hover align-middle mb-0">
            <thead>
            <tr class="table-dark">
                <th>Product</th>
                <th>Category</th>
                <th>Price</th>
                <th>Qty Remaining</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="product : ${products}">
                <td class="fw-semibold" th:text="${product.name}"></td>
                <td>
                    <span class="badge bg-secondary bg-opacity-25 text-secondary"
                          th:text="${product.category}"></span>
                </td>
                <td th:text="|₹${#numbers.formatDecimal(product.price, 1, 2)}|"></td>
                <td>
                    <span class="fw-bold"
                          th:text="${product.quantity}"
                          th:classappend="${product.quantity == 0} ? 'text-danger' : 'text-warning'">
                    </span>
                </td>
                <td>
                    <span th:if="${product.quantity == 0}" class="badge bg-danger">Out of stock</span>
                    <span th:if="${product.lowStock}"
                          class="badge bg-warning text-dark">Low stock</span>
                </td>
                <td>
                    <a th:href="@{/edit-product/{id}(id=${product.id})}"
                       class="btn btn-sm btn-outline-primary">
                        <i class="bi bi-pencil me-1"></i>Restock
                    </a>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
