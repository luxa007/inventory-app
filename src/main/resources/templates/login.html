<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>
<body class="app-body">
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="glass-panel p-4 p-md-5">
                <h1 class="h4 mb-4 fw-bold">Sign in</h1>
                <div th:replace="~{fragments/layout :: flash}"></div>
                <form th:action="@{/login}" method="post" class="needs-validation" novalidate>
                    <div class="mb-3">
                        <label class="form-label small text-muted text-uppercase">Username</label>
                        <input type="text" name="username" class="form-control" required autocomplete="username"
                               autofocus>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small text-muted text-uppercase">Password</label>
                        <input type="password" name="password" class="form-control" required
                               autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn btn-success w-100 py-2 mb-3">
                        <i class="bi bi-box-arrow-in-right me-2"></i>Sign in
                    </button>
                    <p class="text-center text-muted small mb-0">
                        No account? <a href="/register">Register</a>
                    </p>
                </form>
                <p class="text-muted small mt-4 mb-0 text-mono">
                    Dev: <strong>admin</strong> / admin &middot; <strong>viewer</strong> / viewer
                </p>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
