<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: main-layout(~{::div.dash-body})}">
<body>
    <div class="dash-body">
        <div class="d-flex justify-content-between align-items-end mb-4">
            <div>
                <h2 class="fw-bold mb-1">Inventory Dashboard</h2>
                <p class="text-muted mb-0">Real-time tracking and predictive alerts.</p>
            </div>
            <button class="btn btn-primary px-4 py-2"><i class="bi bi-download me-2"></i>Export Report</button>
        </div>

        <div class="row g-4 mb-5">
            <div class="col-md-4">
                <div class="stat-card">
                    <div class="text-muted small fw-bold text-uppercase">Total Inventory</div>
                    <h2 class="fw-bold my-2" th:text="${totalProducts}">0</h2>
                    <div class="text-success small"><i class="bi bi-arrow-up"></i> Live Tracking</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card">
                    <div class="text-muted small fw-bold text-uppercase">Alerts (Low Stock)</div>
                    <h2 class="fw-bold my-2 text-danger" th:text="${lowStockCount}">0</h2>
                    <div class="text-muted small">Requires immediate attention</div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card">
                    <div class="text-muted small fw-bold text-uppercase">Financial Valuation</div>
                    <h2 class="fw-bold my-2" th:text="${'₹' + totalValue}">0</h2>
                    <div class="text-muted small">Based on unit cost x qty</div>
                </div>
            </div>
        </div>

        <div class="table-container shadow-sm">
            <div class="p-4 border-bottom bg-light d-flex justify-content-between">
                <h5 class="mb-0 fw-bold">Stock Inventory</h5>
                <div class="input-group w-25">
                    <input type="text" class="form-control form-control-sm" placeholder="Search products...">
                </div>
            </div>
            <table class="table table-hover align-middle mb-0">
                <thead>
                    <tr class="text-muted small text-uppercase">
                        <th class="ps-4">Product Name</th>
                        <th>Quantity</th>
                        <th>Price</th>
                        <th>Stock Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p : ${products}">
                        <td class="ps-4 py-3 fw-bold" th:text="${p.name}">-</td>
                        <td th:text="${p.quantity}">0</td>
                        <td th:text="${'₹' + p.price}">0</td>
                        <td>
                            <span th:if="${p.quantity < 10}" class="badge rounded-pill bg-danger text-white px-3">Restock</span>
                            <span th:if="${p.quantity >= 10}" class="badge rounded-pill bg-success text-white px-3">Optimal</span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
