<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/layout :: head}"></head>
<body class="app-body">
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container py-4">
    <div th:replace="~{fragments/layout :: flash}"></div>

    <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-3">
        <div>
            <h1 class="h4 mb-0">Products</h1>
            <small class="text-muted" th:text="${totalItems + ' items total'}"></small>
        </div>
        <div class="d-flex gap-2">
            <a th:if="${lowStockCount > 0}" href="/low-stock" class="btn btn-sm btn-outline-warning">
                <i class="bi bi-exclamation-triangle me-1"></i>
                <span th:text="${lowStockCount + ' alerts'}"></span>
            </a>
            <a sec:authorize="hasRole('ADMIN')" href="/add-product" class="btn btn-success btn-sm">
                <i class="bi bi-plus-lg me-1"></i>Add Product
            </a>
        </div>
    </div>

    <form method="get" action="/products" class="mb-3">
        <div class="input-group search-box">
            <input type="text" name="query" class="form-control"
                   placeholder="Search by name or category..."
                   th:value="${query}">
            <button class="btn btn-outline-secondary" type="submit">
                <i class="bi bi-search"></i>
            </button>
            <a th:if="${query != null and !query.isEmpty()}"
               href="/products" class="btn btn-outline-secondary">
                <i class="bi bi-x"></i>
            </a>
        </div>
    </form>

    <div class="table-responsive glass-panel p-2">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-dark">
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Category</th>
                <th>Price</th>
                <th>Quantity</th>
                <th sec:authorize="hasRole('ADMIN')">Actions</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="product : ${products}">
                <td class="text-muted small text-mono" th:text="${product.id}"></td>
                <td class="fw-semibold" th:text="${product.name}"></td>
                <td>
                    <span class="badge bg-secondary"
                          th:text="${product.category}"></span>
                </td>
                <td class="text-mono" th:text="|₹${#numbers.formatDecimal(product.price, 1, 2)}|"></td>
                <td>
                    <span th:if="${product.outOfStock}" class="stock-critical">
                        <i class="bi bi-x-circle me-1"></i>Out of stock
                    </span>
                    <span th:if="${product.isLowStock(lowStockThreshold)}" class="stock-low">
                        <i class="bi bi-exclamation-triangle me-1"></i>
                        <span th:text="${product.quantity}"></span>
                    </span>
                    <span th:if="${!product.outOfStock and !product.isLowStock(lowStockThreshold)}" class="stock-ok"
                          th:text="${product.quantity}"></span>
                </td>
                <td sec:authorize="hasRole('ADMIN')">
                    <a th:href="@{/edit-product/{id}(id=${product.id})}"
                       class="btn btn-sm btn-outline-primary btn-action me-1">
                        <i class="bi bi-pencil me-1"></i>Edit
                    </a>
                    <form th:action="@{/delete-product/{id}(id=${product.id})}"
                          method="post" class="d-inline"
                          data-confirm="Delete this product? This cannot be undone.">
                        <button type="submit" class="btn btn-sm btn-outline-danger btn-action">
                            <i class="bi bi-trash me-1"></i>Delete
                        </button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(products)}" sec:authorize="hasRole('ADMIN')">
                <td colspan="6" class="text-center text-muted py-5">
                    <i class="bi bi-inbox display-6 d-block mb-2"></i>
                    <span th:if="${query != null and !query.isEmpty()}">
                        No products found for "<span th:text="${query}"></span>"
                    </span>
                    <span th:if="${query == null or query.isEmpty()}">
                        No products yet. <a href="/add-product">Add your first product.</a>
                    </span>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(products)}" sec:authorize="!hasRole('ADMIN')">
                <td colspan="5" class="text-center text-muted py-5">
                    <i class="bi bi-inbox display-6 d-block mb-2"></i>
                    <span th:if="${query != null and !query.isEmpty()}">
                        No products found for "<span th:text="${query}"></span>"
                    </span>
                    <span th:if="${query == null or query.isEmpty()}">
                        No products yet.
                    </span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <nav th:if="${totalPages > 1}" class="mt-3">
        <ul class="pagination pagination-sm justify-content-center">
            <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/products(query=${query}, page=${currentPage - 1})}">&laquo;</a>
            </li>
            <li class="page-item"
                th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                th:classappend="${i == currentPage} ? 'active'">
                <a class="page-link"
                   th:href="@{/products(query=${query}, page=${i})}"
                   th:text="${i + 1}"></a>
            </li>
            <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                <a class="page-link"
                   th:href="@{/products(query=${query}, page=${currentPage + 1})}">&raquo;</a>
            </li>
        </ul>
    </nav>

</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
