<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>
<body class="bg-light">
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container">
    <div th:replace="~{fragments/layout :: flash}"></div>

    <div class="p-5 mb-4 bg-dark text-white rounded-3">
        <div class="container-fluid py-2">
            <h1 class="display-6 fw-bold">
                <i class="bi bi-boxes me-2"></i>SmartStock
                <span class="text-success">AI</span>
            </h1>
            <p class="col-md-8 fs-5 text-white-50">
                AI-powered inventory management. Track stock, get restock suggestions,
                and never run out of essentials.
            </p>
            <div class="d-flex gap-3 mt-4 flex-wrap">
                <a href="/products" class="btn btn-success btn-lg px-4">
                    <i class="bi bi-grid me-2"></i>View Products
                </a>
                <a href="/add-product" class="btn btn-outline-light btn-lg px-4">
                    <i class="bi bi-plus-lg me-2"></i>Add Product
                </a>
                <a href="/register" class="btn btn-outline-info btn-lg px-4">
                    <i class="bi bi-person-plus me-2"></i>Register
                </a>
            </div>
        </div>
    </div>

    <div class="row g-3 mb-4">
        <div class="col-md-4">
            <a href="/products" class="text-decoration-none">
                <div class="card border-0 shadow-sm h-100 stat-card p-3">
                    <div class="d-flex align-items-center gap-3">
                        <div class="fs-2 text-success"><i class="bi bi-grid"></i></div>
                        <div>
                            <div class="stat-label">All Products</div>
                            <div class="stat-number text-dark">Browse Inventory</div>
                        </div>
                    </div>
                </div>
            </a>
        </div>
        <div class="col-md-4">
            <a href="/products/low-stock" class="text-decoration-none">
                <div class="card border-0 shadow-sm h-100 stat-card p-3">
                    <div class="d-flex align-items-center gap-3">
                        <div class="fs-2 text-warning"><i class="bi bi-exclamation-triangle"></i></div>
                        <div>
                            <div class="stat-label">Low Stock</div>
                            <div class="stat-number text-dark">Check Alerts</div>
                        </div>
                    </div>
                </div>
            </a>
        </div>
        <div class="col-md-4">
            <a href="/add-product" class="text-decoration-none">
                <div class="card border-0 shadow-sm h-100 stat-card p-3">
                    <div class="d-flex align-items-center gap-3">
                        <div class="fs-2 text-primary"><i class="bi bi-plus-circle"></i></div>
                        <div>
                            <div class="stat-label">Add New</div>
                            <div class="stat-number text-dark">New Product</div>
                        </div>
                    </div>
                </div>
            </a>
        </div>
    </div>

</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
