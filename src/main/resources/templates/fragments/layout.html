<head xmlns:th="http://www.thymeleaf.org" th:fragment="head">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle != null ? pageTitle + ' | SmartStock AI' : 'SmartStock AI'}">SmartStock AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand span { color: #198754; }
        .stock-critical { color: #dc3545; font-weight: 600; }
        .stock-low      { color: #fd7e14; font-weight: 600; }
        .stock-ok       { color: #198754; }
        .table th       { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
        .btn-action     { min-width: 70px; }
        .search-box     { max-width: 340px; }
        .flash-alert    { border-radius: 8px; }
        .stat-card      { border: none; border-radius: 12px; }
        .stat-card .stat-number { font-size: 1.8rem; font-weight: 600; }
        .stat-card .stat-label  { font-size: 0.8rem; color: #6c757d; }
        .ai-badge { background: linear-gradient(135deg, #198754, #0d6efd);
                    color: white; font-size: 0.65rem; padding: 2px 7px;
                    border-radius: 99px; vertical-align: middle; }
    </style>
</head>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4" th:fragment="navbar">
    <div class="container">
        <a class="navbar-brand fw-semibold" href="/">
            <i class="bi bi-boxes me-1"></i>Smart<span>Stock</span>
            <span class="ai-badge ms-1">AI</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContent">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" href="/"><i class="bi bi-house me-1"></i>Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/products"><i class="bi bi-grid me-1"></i>Products</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/products/low-stock">
                        <i class="bi bi-exclamation-triangle me-1"></i>Low Stock
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/add-product">
                        <i class="bi bi-plus-circle me-1"></i>Add Product
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/register"><i class="bi bi-person-plus me-1"></i>Register</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container" th:fragment="flash">
    <div th:if="${successMessage}"
         class="alert alert-success alert-dismissible fade show flash-alert" role="alert">
        <i class="bi bi-check-circle me-2"></i>
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}"
         class="alert alert-danger alert-dismissible fade show flash-alert" role="alert">
        <i class="bi bi-exclamation-circle me-2"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
</div>

<footer class="mt-5 py-3 border-top text-center text-muted small" th:fragment="footer">
    <div class="container">
        SmartStock AI &mdash; Inventory Management &copy; 2026
        &nbsp;|&nbsp;
        <a href="/h2-console" target="_blank" class="text-muted text-decoration-none">
            <i class="bi bi-database me-1"></i>DB Console
        </a>
    </div>
</footer>

<div xmlns:th="http://www.thymeleaf.org" th:fragment="scripts">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</div>
