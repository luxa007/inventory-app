<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Product</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-5">
    <h2>Add New Product</h2>
    <form th:action="@{/products/add}" th:object="${product}" method="post">
        <div class="mb-3"><label>Name</label><input type="text" th:field="*{name}" class="form-control" required></div>
        <div class="mb-3"><label>Quantity</label><input type="number" th:field="*{quantity}" class="form-control" required></div>
        <div class="mb-3"><label>Price</label><input type="number" step="0.01" th:field="*{price}" class="form-control" required></div>
        <button type="submit" class="btn btn-success">Save Product</button>
        <a href="/products" class="btn btn-secondary">Cancel</a>
    </form>
</body>
</html>
