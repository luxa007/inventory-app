<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>
<body class="bg-light">
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container">
    <div class="row justify-content-center">
        <div class="col-lg-6">

            <nav aria-label="breadcrumb" class="mb-3">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item"><a href="/products">Products</a></li>
                    <li class="breadcrumb-item active" th:text="${pageTitle}"></li>
                </ol>
            </nav>

            <div class="card shadow-sm border-0">
                <div class="card-body p-4">
                    <h1 class="h5 mb-4 fw-semibold" th:text="${pageTitle}">Product Form</h1>

                    <form th:action="${formAction}" th:object="${product}" method="post" novalidate>
                        <input type="hidden" th:field="*{id}"/>

                        <div class="mb-3">
                            <label class="form-label fw-medium">Name <span class="text-danger">*</span></label>
                            <input type="text"
                                   th:field="*{name}"
                                   th:classappend="${#fields.hasErrors('name')} ? 'is-invalid'"
                                   class="form-control"
                                   placeholder="e.g. Basmati Rice 5kg"
                                   autofocus>
                            <div class="invalid-feedback" th:errors="*{name}"></div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-medium">Category <span class="text-danger">*</span></label>
                            <input type="text"
                                   th:field="*{category}"
                                   th:classappend="${#fields.hasErrors('category')} ? 'is-invalid'"
                                   class="form-control"
                                   placeholder="e.g. Dairy, Grains, Beverages"
                                   list="category-suggestions">
                            <datalist id="category-suggestions">
                                <option th:each="cat : ${categories}" th:value="${cat}"></option>
                            </datalist>
                            <div class="invalid-feedback" th:errors="*{category}"></div>
                            <div class="form-text">Choose an existing category or type a new one.</div>
                        </div>

                        <div class="row g-3 mb-3">
                            <div class="col-6">
                                <label class="form-label fw-medium">Price (₹) <span class="text-danger">*</span></label>
                                <input type="number" step="0.01" min="0.01"
                                       th:field="*{price}"
                                       th:classappend="${#fields.hasErrors('price')} ? 'is-invalid'"
                                       class="form-control"
                                       placeholder="0.00">
                                <div class="invalid-feedback" th:errors="*{price}"></div>
                            </div>
                            <div class="col-6">
                                <label class="form-label fw-medium">Quantity <span class="text-danger">*</span></label>
                                <input type="number" min="0"
                                       th:field="*{quantity}"
                                       th:classappend="${#fields.hasErrors('quantity')} ? 'is-invalid'"
                                       class="form-control"
                                       placeholder="0">
                                <div class="invalid-feedback" th:errors="*{quantity}"></div>
                            </div>
                        </div>

                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-success px-4">
                                <i class="bi bi-check-lg me-1"></i>
                                <span th:text="${product.id != null ? 'Update Product' : 'Save Product'}"></span>
                            </button>
                            <a href="/products" class="btn btn-outline-secondary">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
