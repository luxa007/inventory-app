<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>
<body class="app-body">
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5 col-lg-4">
            <div class="glass-panel p-4 p-md-5">
                <h1 class="h4 mb-4 fw-bold">Create account</h1>
                <div th:replace="~{fragments/layout :: flash}"></div>
                <form th:action="@{/register}" method="post" class="needs-validation" novalidate>
                    <div class="mb-3">
                        <label class="form-label small text-muted text-uppercase">Username</label>
                        <input type="text" name="username" class="form-control" required autocomplete="username"
                               autofocus>
                    </div>
                    <div class="mb-4">
                        <label class="form-label small text-muted text-uppercase">Password</label>
                        <input type="password" name="password" class="form-control" required minlength="4"
                               autocomplete="new-password">
                        <div class="form-text text-muted small">At least 4 characters.</div>
                    </div>
                    <button type="submit" class="btn btn-success w-100 py-2 mb-3">Register</button>
                    <p class="text-center text-muted small mb-0">
                        Already have an account? <a href="/login">Sign in</a>
                    </p>
                </form>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
