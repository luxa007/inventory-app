<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head}"></head>
<body class="bg-light">
<div th:replace="~{fragments/layout :: navbar}"></div>

<main class="container">
    <div class="row justify-content-center mt-5">
        <div class="col-md-6 text-center">
            <div class="card shadow-sm border-0 p-5">
                <div class="display-1 fw-bold text-muted mb-3"
                     th:text="${errorCode != null ? errorCode : status}">500</div>
                <h2 class="h4 mb-2" th:text="${errorTitle != null ? errorTitle : 'Something went wrong'}">Error</h2>
                <p class="text-muted mb-4"
                   th:text="${errorMessage != null ? errorMessage : (message != null ? message : 'An unexpected error occurred.')}"></p>
                <a href="/products" class="btn btn-success px-4">
                    <i class="bi bi-arrow-left me-1"></i>Back to Products
                </a>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{fragments/layout :: footer}"></div>
<div th:replace="~{fragments/layout :: scripts}"></div>
</body>
</html>
