# Production — PostgreSQL + Flyway
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:smartstock}
spring.datasource.username=${DB_USER:smartstock}
spring.datasource.password=${DB_PASSWORD:smartstock}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.h2.console.enabled=false
