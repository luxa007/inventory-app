services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: smartstock
      POSTGRES_USER: smartstock
      POSTGRES_PASSWORD: smartstock
    ports:
      - "5432:5432"
    volumes:
      - smartstock_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartstock -d smartstock"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: smartstock
      DB_USER: smartstock
      DB_PASSWORD: smartstock
      JAVA_OPTS: "-Xmx512m"

volumes:
  smartstock_pg:
